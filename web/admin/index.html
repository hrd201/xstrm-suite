<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>xstrm Admin</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #374151; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    h1,h2,h3 { margin: 0 0 12px; }
    .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .kv { font-size: 14px; line-height: 1.7; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    button { background: #2563eb; color: white; border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-size: 14px; }
    button.secondary { background: #374151; }
    button.danger { background: #dc2626; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    input, select { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid #4b5563; background: #0f172a; color: #e5e7eb; }
    pre { white-space: pre-wrap; word-break: break-word; background: #020617; border-radius: 10px; padding: 12px; min-height: 180px; max-height: 420px; overflow: auto; }
    .muted { color: #9ca3af; font-size: 13px; }
    .ok { color: #34d399; }
    .bad { color: #f87171; }
    .running { color: #fbbf24; }
    .pill { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 12px; background: #1f2937; border: 1px solid #374151; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .toast { position: fixed; right: 20px; bottom: 20px; max-width: 420px; background: #111827; border: 1px solid #374151; border-left: 4px solid #2563eb; padding: 12px 14px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.35); display: none; }
    .toast.show { display: block; }
    .toast.ok { border-left-color: #10b981; }
    .toast.bad { border-left-color: #ef4444; }
    .two-col { display:grid; grid-template-columns: 1fr 180px; gap:10px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div>
        <h1>xstrm Web 管理页</h1>
        <p class="muted">第二版：自动刷新状态、执行反馈优化、指定目录历史、日志自动拉取。</p>
      </div>
      <div>
        <span class="pill">API: /api/admin/xstrm</span>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2>当前状态</h2>
        <div class="actions">
          <select id="autoRefreshSelect" style="width:auto; min-width:130px;">
            <option value="0">关闭自动刷新</option>
            <option value="5">每 5 秒</option>
            <option value="10" selected>每 10 秒</option>
            <option value="30">每 30 秒</option>
          </select>
          <button id="refreshBtn" class="secondary">刷新状态</button>
        </div>
      </div>
      <div id="status" class="grid"></div>
    </div>

    <div class="card">
      <h2>任务操作</h2>
      <div class="actions" style="margin-bottom:12px;">
        <button id="scanBtn">扫描新增影片</button>
        <button id="rebuildBtn" class="danger">全量重建</button>
      </div>

      <div style="margin-top:8px; margin-bottom:10px;">
        <label class="muted">扫描指定目录</label>
        <div class="two-col">
          <input id="pathInput" placeholder="例如 /115/电影/泰坦尼克号 或 /mnt/115/电影/泰坦尼克号" />
          <button id="scanPathBtn">执行指定目录扫描</button>
        </div>
      </div>

      <div style="margin-top:12px;">
        <h3 style="font-size:15px;">最近使用的目录</h3>
        <div id="pathHistory" class="actions"></div>
      </div>

      <p class="muted" style="margin-top:12px;">说明：全量重建会删除旧 .strm 并重新生成，建议谨慎操作。管理入口建议继续通过 nginx 访问控制或 Basic Auth 保护。</p>
    </div>

    <div class="card">
      <h2>管理密码</h2>
      <p class="muted">用于保护 `/admin/xstrm/` 和 `/api/admin/xstrm/` 的 Basic Auth。当前用户名固定为 <code>admin</code>。</p>
      <div class="two-col" style="margin-bottom:10px;">
        <input id="newPasswordInput" type="password" placeholder="输入新密码（至少 8 位）" />
        <input id="confirmPasswordInput" type="password" placeholder="再次输入新密码" />
      </div>
      <div class="actions">
        <button id="changePasswordBtn" class="secondary">更新管理密码</button>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2>最近日志</h2>
        <div class="actions">
          <button id="logBtn" class="secondary">刷新日志</button>
        </div>
      </div>
      <pre id="logBox">加载中...</pre>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const statusEl = document.getElementById('status');
    const logBox = document.getElementById('logBox');
    const refreshBtn = document.getElementById('refreshBtn');
    const logBtn = document.getElementById('logBtn');
    const scanBtn = document.getElementById('scanBtn');
    const rebuildBtn = document.getElementById('rebuildBtn');
    const scanPathBtn = document.getElementById('scanPathBtn');
    const pathInput = document.getElementById('pathInput');
    const pathHistoryEl = document.getElementById('pathHistory');
    const autoRefreshSelect = document.getElementById('autoRefreshSelect');
    const toastEl = document.getElementById('toast');
    const newPasswordInput = document.getElementById('newPasswordInput');
    const confirmPasswordInput = document.getElementById('confirmPasswordInput');
    const changePasswordBtn = document.getElementById('changePasswordBtn');

    let refreshTimer = null;
    const PATH_HISTORY_KEY = 'xstrm.admin.pathHistory';

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showToast(message, type='ok') {
      toastEl.className = `toast show ${type}`;
      toastEl.textContent = message;
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toastEl.className = 'toast', 4200);
    }

    function setButtonsDisabled(disabled) {
      [refreshBtn, logBtn, scanBtn, rebuildBtn, scanPathBtn, changePasswordBtn].forEach(btn => btn.disabled = disabled);
    }

    function renderStatus(data) {
      const s = data?.status || {};
      const stateText = s.running ? '<span class="running">执行中</span>' : (s.success === false ? '<span class="bad">失败</span>' : '<span class="ok">空闲/成功</span>');
      statusEl.innerHTML = `
        <div class="card kv"><strong>状态</strong><br>${stateText}</div>
        <div class="card kv"><strong>任务</strong><br>${escapeHtml(s.task || '-')}</div>
        <div class="card kv"><strong>消息</strong><br>${escapeHtml(s.message || '-')}</div>
        <div class="card kv"><strong>开始时间</strong><br>${escapeHtml(s.started_at || '-')}</div>
        <div class="card kv"><strong>结束时间</strong><br>${escapeHtml(s.finished_at || '-')}</div>
        <div class="card kv"><strong>日志文件</strong><br>${escapeHtml(s.log_file || '-')}</div>
        <div class="card kv"><strong>扫描源</strong><br>${escapeHtml((s.sources || []).join(' / ') || '-')}</div>
      `;
    }

    async function fetchJson(url, options={}) {
      const res = await fetch(url, options);
      const data = await res.json();
      if (!res.ok || data.ok === false) throw new Error(data.error || '请求失败');
      return data;
    }

    async function loadStatus() {
      const data = await fetchJson('/api/admin/xstrm/status');
      renderStatus(data);
      return data;
    }

    async function loadLogs() {
      const data = await fetchJson('/api/admin/xstrm/logs/latest');
      logBox.textContent = data.content || '(暂无日志)';
      return data;
    }

    function getPathHistory() {
      try { return JSON.parse(localStorage.getItem(PATH_HISTORY_KEY) || '[]'); }
      catch { return []; }
    }

    function savePathHistory(path) {
      const list = getPathHistory().filter(x => x !== path);
      list.unshift(path);
      localStorage.setItem(PATH_HISTORY_KEY, JSON.stringify(list.slice(0, 6)));
      renderPathHistory();
    }

    function renderPathHistory() {
      const list = getPathHistory();
      pathHistoryEl.innerHTML = '';
      if (!list.length) {
        pathHistoryEl.innerHTML = '<span class="muted">暂无历史目录</span>';
        return;
      }
      list.forEach(path => {
        const btn = document.createElement('button');
        btn.className = 'secondary';
        btn.textContent = path;
        btn.onclick = () => { pathInput.value = path; };
        pathHistoryEl.appendChild(btn);
      });
    }

    function setAutoRefresh(seconds) {
      if (refreshTimer) clearInterval(refreshTimer);
      if (!seconds) return;
      refreshTimer = setInterval(async () => {
        try {
          await loadStatus();
          await loadLogs();
        } catch {}
      }, seconds * 1000);
    }

    async function runAction(url, body=null, confirmText=null, successLabel='已提交') {
      if (confirmText && !window.confirm(confirmText)) return;
      setButtonsDisabled(true);
      try {
        const data = await fetchJson(url, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: body ? JSON.stringify(body) : '{}'
        });
        const text = (data.stdout || data.stderr || successLabel).trim();
        showToast(text || successLabel, 'ok');
        if (body?.path) savePathHistory(body.path);
      } catch (e) {
        showToast('执行失败：' + e.message, 'bad');
      } finally {
        await loadStatus().catch(() => {});
        await loadLogs().catch(() => {});
        setButtonsDisabled(false);
      }
    }

    refreshBtn.onclick = async () => {
      setButtonsDisabled(true);
      try {
        await loadStatus();
        await loadLogs();
        showToast('状态已刷新');
      } catch (e) {
        showToast('刷新失败：' + e.message, 'bad');
      } finally {
        setButtonsDisabled(false);
      }
    };

    logBtn.onclick = async () => {
      try {
        await loadLogs();
        showToast('日志已刷新');
      } catch (e) {
        showToast('日志刷新失败：' + e.message, 'bad');
      }
    };

    scanBtn.onclick = () => runAction('/api/admin/xstrm/scan', null, null, '已触发增量扫描');
    rebuildBtn.onclick = () => runAction('/api/admin/xstrm/rebuild', null, '确认执行全量重建？这会删除旧 .strm 并重新生成。', '已触发全量重建');
    scanPathBtn.onclick = () => {
      const path = pathInput.value.trim();
      if (!path) return showToast('请先输入目录', 'bad');
      runAction('/api/admin/xstrm/scan-path', {path}, null, '已触发指定目录扫描');
    };
    changePasswordBtn.onclick = async () => {
      const password = newPasswordInput.value.trim();
      const confirm = confirmPasswordInput.value.trim();
      if (!password) return showToast('请输入新密码', 'bad');
      if (password.length < 8) return showToast('新密码至少 8 位', 'bad');
      if (password !== confirm) return showToast('两次输入的密码不一致', 'bad');
      setButtonsDisabled(true);
      try {
        const data = await fetchJson('/api/admin/xstrm/change-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({password, confirm})
        });
        newPasswordInput.value = '';
        confirmPasswordInput.value = '';
        showToast(data.message || '密码已更新', 'ok');
      } catch (e) {
        showToast('修改密码失败：' + e.message, 'bad');
      } finally {
        setButtonsDisabled(false);
      }
    };

    autoRefreshSelect.onchange = () => setAutoRefresh(Number(autoRefreshSelect.value));

    renderPathHistory();
    Promise.all([loadStatus(), loadLogs()]).then(() => {
      setAutoRefresh(Number(autoRefreshSelect.value));
    }).catch(err => {
      statusEl.innerHTML = '<div class="bad">状态加载失败：' + escapeHtml(err.message) + '</div>';
      logBox.textContent = '日志加载失败：' + err.message;
      showToast('页面初始化失败：' + err.message, 'bad');
    });
  </script>
</body>
</html>
